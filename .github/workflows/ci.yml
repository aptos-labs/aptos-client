name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-node-pnpm

      - run: pnpm check

      - run: pnpm typecheck

      - run: pnpm build

      - name: Verify declaration files exist
        run: |
          test -f dist/index.fetch.d.ts   || { echo "Missing dist/index.fetch.d.ts"; exit 1; }
          test -f dist/index.node.d.ts   || { echo "Missing dist/index.node.d.ts"; exit 1; }
          test -f dist/index.browser.d.ts || { echo "Missing dist/index.browser.d.ts"; exit 1; }

      - run: pnpm test

      - run: pnpm test:build

  test-deno:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2
        with:
          deno-version: v2.x

      - uses: ./.github/actions/setup-node-pnpm

      - run: pnpm build
      - run: pnpm test:deno

  test-bun:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - uses: ./.github/actions/setup-node-pnpm

      - run: pnpm build
      - run: pnpm test:bun

  sdk-compat:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          path: aptos-client
          persist-credentials: false

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: aptos-labs/aptos-ts-sdk
          path: aptos-ts-sdk
          persist-credentials: false

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
        with:
          package_json_file: aptos-ts-sdk/package.json

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: aptos-ts-sdk/pnpm-lock.yaml

      - uses: aptos-labs/actions/aikidosec-safe-chain@main

      - name: Build aptos-client from source
        working-directory: aptos-client
        run: |
          pnpm install --frozen-lockfile
          pnpm build
          pnpm pack --pack-destination ../

      - name: Install SDK with local aptos-client
        working-directory: aptos-ts-sdk
        run: |
          pnpm install --frozen-lockfile
          pnpm add ../aptos-labs-aptos-client-*.tgz
          pnpm add undici@^7

      - name: Build SDK with local aptos-client
        working-directory: aptos-ts-sdk
        run: pnpm build

      - name: Run SDK tests (unit + e2e) with local aptos-client
        uses: nick-fields/retry@ce71cc2ab81d554ebbe88c79ab5975992d79ba08 # pin@v3
        env:
          TMPDIR: ${{ runner.temp }}
        with:
          max_attempts: 3
          timeout_minutes: 25
          command: cd aptos-ts-sdk && pnpm test

      - name: Print local testnet logs on failure
        if: failure()
        run: cat ${{ runner.temp }}/local-testnet-logs.txt || true
