name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm check

      - run: pnpm typecheck

      - run: pnpm build

      - name: Verify declaration files exist
        run: |
          test -f dist/fetch/index.fetch.d.mts   || { echo "Missing dist/fetch/index.fetch.d.mts"; exit 1; }
          test -f dist/node/index.node.d.ts       || { echo "Missing dist/node/index.node.d.ts"; exit 1; }
          test -f dist/browser/index.browser.d.ts || { echo "Missing dist/browser/index.browser.d.ts"; exit 1; }

      - run: pnpm test

  test-deno:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test:deno

  test-bun:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test:bun

  sdk-compat:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          path: aptos-client
          persist-credentials: false

      - uses: actions/checkout@v6
        with:
          repository: aptos-labs/aptos-ts-sdk
          path: aptos-ts-sdk
          persist-credentials: false

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: aptos-ts-sdk/package.json

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: aptos-ts-sdk/pnpm-lock.yaml

      - name: Build aptos-client from source
        working-directory: aptos-client
        run: |
          pnpm install --frozen-lockfile
          pnpm build
          pnpm pack --pack-destination ../

      - name: Install SDK with local aptos-client
        working-directory: aptos-ts-sdk
        run: |
          pnpm install --frozen-lockfile
          pnpm add ../aptos-labs-aptos-client-*.tgz

      - name: Build SDK with local aptos-client
        working-directory: aptos-ts-sdk
        run: pnpm build
